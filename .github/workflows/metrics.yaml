name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          filename: metrics.svg
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          base_hireable: yes
          repositories_skipped: ahmad-mah
          commits_authoring: ahmad-mah
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_details: bytes, percentage
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_skipped: ahmad-mah
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_skipped: ahmad-mah
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 6
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30
          plugin_activity_visibility: all
          plugin_activity_timestamps: yes
          plugin_activity_skipped: ahmad-mah
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          config_timezone: Africa/Cairo
          config_order: base.header, isocalendar, languages, habits, lines, achievements, activity, notable
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics [skip ci]"
